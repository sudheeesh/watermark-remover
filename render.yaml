# Render blueprint for the watermark-remover backend (free tier).
# ffmpeg engines only (delogo / removelogo) — see backend/Dockerfile.
services:
  - type: web
    name: watermark-remover-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free
